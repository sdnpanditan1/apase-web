<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>PTK Panditan 1 - APASE WEB</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

padding:30px;

overflow-x:hidden;

color:white;

}

/* BACKGROUND */

.blur1,
.blur2{

position:fixed;

border-radius:50%;

filter:blur(120px);

opacity:.4;

z-index:0;

}

.blur1{

width:350px;
height:350px;

background:#60a5fa;

top:-120px;
left:-120px;

}

.blur2{

width:350px;
height:350px;

background:#2563eb;

bottom:-120px;
right:-120px;

}

/* CONTAINER */

.container{

position:relative;

z-index:2;

max-width:1400px;

margin:auto;

}

/* HEADER */

.header{

background:
linear-gradient(
135deg,
#166534,
#15803d,
#22c55e
);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:35px;

padding:40px 30px;

text-align:center;

margin-bottom:30px;

box-shadow:
0 10px 35px rgba(0,0,0,0.25);

}

.header h1{

font-size:40px;

font-weight:700;

margin-bottom:10px;

}

.header p{

color:#dbeafe;

font-size:16px;

}

/* SEARCH */

.search-box{

margin-bottom:30px;

display:flex;

justify-content:center;

}

.search-box input{

width:100%;

max-width:500px;

padding:16px 20px;

border:none;

outline:none;

border-radius:18px;

background:
rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

color:white;

font-size:16px;

}

.search-box input::placeholder{

color:#dbeafe;

}

/* STAT */

.stat-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:25px;

margin-bottom:30px;

}

.stat-card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:30px;

text-align:center;

box-shadow:
0 10px 35px rgba(0,0,0,0.2);

}

.stat-card h2{

font-size:40px;

margin-bottom:10px;

}

.stat-card p{

color:#dbeafe;

}

/* CARD GRID */

.card-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(320px,1fr));

gap:25px;

margin-bottom:40px;

}

.teacher-card{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:30px;

padding:25px;

transition:.3s;

box-shadow:
0 10px 35px rgba(0,0,0,0.2);

}

.teacher-card:hover{

transform:translateY(-8px);

background:
rgba(255,255,255,0.18);

}

.teacher-name{

font-size:22px;

font-weight:700;

margin-bottom:10px;

}

.teacher-job{

display:inline-block;

padding:8px 14px;

border-radius:12px;

background:
rgba(255,255,255,0.15);

font-size:13px;

margin-bottom:18px;

}

.teacher-info{

font-size:14px;

line-height:1.9;

color:#e2e8f0;

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.15);

border-radius:35px;

padding:25px;

overflow-x:auto;

box-shadow:
0 10px 35px rgba(0,0,0,0.2);

}

.table-title{

font-size:24px;

font-weight:700;

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

}

th,
td{

padding:15px;

text-align:left;

border-bottom:
1px solid rgba(255,255,255,0.08);

font-size:14px;

vertical-align:top;

}

th{

background:
rgba(255,255,255,0.1);

color:#dbeafe;

}

/* BUTTON */

.button-area{

margin-top:35px;

text-align:center;

}

.back-btn{

display:inline-block;

padding:14px 28px;

border-radius:16px;

background:white;

color:#1e3a8a;

text-decoration:none;

font-weight:700;

transition:.3s;

box-shadow:
0 10px 25px rgba(0,0,0,0.2);

}

.back-btn:hover{

background:#dbeafe;

transform:translateY(-3px);

}

/* LOADING */

.loading{

text-align:center;

font-size:20px;

padding:40px;

color:#dbeafe;

}

/* RESPONSIVE */

@media(max-width:768px){

body{

padding:15px;

}

.header h1{

font-size:30px;

}

}

</style>

</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1 style="line-height:1.5;">
DAFTAR NAMA GURU DAN TENAGA KEPENDIDIKAN
</h1>

<p style="margin-top:15px; line-height:1.9; font-size:18px;">

SDN PANDITAN I LUMBANG
<br>

KABUPATEN PASURUAN
<br>

NPSN : 20519051

</p>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
       id="searchInput"
       placeholder="Cari nama PTK...">

</div>

<!-- STAT -->

<div class="stat-grid">

<div class="stat-card">

<h2 id="totalPTK">
0
</h2>

<p>Total PTK</p>

</div>

</div>

<!-- LOADING -->

<div class="loading"
     id="loading">

Memuat data PTK...

</div>

<!-- CARD -->

<div class="card-grid"
     id="cardGrid">

</div>

<!-- TABLE -->

<div class="table-container">

<div class="table-title">

Data Lengkap PTK

</div>

<table>

<thead>

<tr>

<th>NO</th>
<th>NAMA</th>
<th>NIP / NRPTT / NRTS</th>
<th>TEMPAT LAHIR</th>
<th>TANGGAL LAHIR</th>
<th>PANGKAT</th>
<th>PENDIDIKAN</th>
<th>TUGAS</th>
<th>MULAI</th>
<th>NUPTK</th>
<th>ALAMAT</th>
<th>STATUS</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<!-- BUTTON -->

<div class="button-area">

<a href="dashboard.html"
   class="back-btn">

← Kembali ke Dashboard

</a>

</div>

</div>

<script>

// =====================================
// API URL APPS SCRIPT BARU
// =====================================

const API_URL =
"https://script.google.com/macros/s/AKfycbwxbjwlJNBnnSMqgIZAodmJUbpJ0RgvIoetmf3hfxIGn3kdRQosQlYuUWDtI0L0lPHf/exec";

// =====================================
// ELEMENT
// =====================================

const tableBody =
document.getElementById(
"tableBody"
);

const cardGrid =
document.getElementById(
"cardGrid"
);

const totalPTK =
document.getElementById(
"totalPTK"
);

const loading =
document.getElementById(
"loading"
);

const searchInput =
document.getElementById(
"searchInput"
);

let allData = [];

// =====================================
// LOAD DATA PTK
// =====================================

async function loadPTK(){

try{

const response =
await fetch(
`${API_URL}?action=getDataPTK`
);

const result =
await response.json();

if(result.status === "success"){

allData =
result.data;

renderData(allData);

loading.style.display =
"none";

}
else{

loading.innerHTML =
"Gagal memuat data PTK";

}

}
catch(error){

loading.innerHTML =
"Gagal memuat data";

console.log(error);

}

}

// =====================================
// RENDER DATA
// =====================================

function renderData(data){

tableBody.innerHTML = "";
cardGrid.innerHTML = "";

totalPTK.innerText =
data.length;

data.forEach(row => {

const no = row.no || "-";
const nama = row.nama || "-";
const nip = row.nip || "-";
const tempat = row.tempat_lahir || "-";
const tanggal = row.tanggal_lahir || "-";
const pangkat = row.pangkat || "-";
const pendidikan = row.pendidikan || "-";
const tugas = row.tugas || "-";
const mulai = row.mulai || "-";
const nuptk = row.nuptk || "-";
const alamat = row.alamat || "-";
const status = row.status || "-";

// CARD
cardGrid.innerHTML += `

<div class="teacher-card">

<div class="teacher-name">
${nama}
</div>

<div class="teacher-job">
${tugas}
</div>

<div class="teacher-info">

<b>NIP:</b> ${nip}<br>

<b>Pendidikan:</b> ${pendidikan}<br>

<b>Status:</b> ${status}<br>

<b>NUPTK:</b> ${nuptk}<br>

<b>TTL:</b> ${tempat}, ${tanggal}

</div>

</div>

`;

// TABLE
tableBody.innerHTML += `

<tr>

<td>${no}</td>
<td>${nama}</td>
<td>${nip}</td>
<td>${tempat}</td>
<td>${tanggal}</td>
<td>${pangkat}</td>
<td>${pendidikan}</td>
<td>${tugas}</td>
<td>${mulai}</td>
<td>${nuptk}</td>
<td>${alamat}</td>
<td>${status}</td>

</tr>

`;

});

}

// =====================================
// SEARCH
// =====================================

searchInput.addEventListener(
"keyup",
function(){

const keyword =
this.value.toLowerCase();

const filtered =
allData.filter(row => {

return String(row.nama)
.toLowerCase()
.includes(keyword);

});

renderData(filtered);

}
);

// =====================================
// INIT
// =====================================

loadPTK();

</script>

</body>
</html>
