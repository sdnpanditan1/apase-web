<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Sekolah - APASE WEB</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #0284c7);
      padding: 40px 20px;
      overflow-x:hidden;
      position:relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ========================= */
    /* GLOW BACKGROUND EFFECT */
    /* ========================= */
    .blur-circle {
      position: fixed;
      border-radius: 50%;
      filter: blur(150px);
      opacity: .3;
      z-index: 0;
    }
    .blur-1 { width: 400px; height: 400px; background: #38bdf8; top: -100px; left: -100px; }
    .blur-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -100px; }

    /* ========================= */
    /* MAIN CONTAINER */
    /* ========================= */
    .container{
      position:relative;
      z-index:2;
      width: 100%;
      max-width: 900px;
      margin: auto;
    }

    /* ========================= */
    /* HEADER PROFILE CARD */
    /* ========================= */
    .profile-header {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 40px 30px;
      text-align: center;
      color: white;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }

    .logo-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
    }

    .logo-wrapper::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 50%;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
      animation: pulse 2s infinite;
    }

    .profile-header img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
      background: white;
      padding: 8px;
      position: relative;
      z-index: 2;
    }

    .profile-header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .profile-header p {
      font-size: 14px;
      color: #93c5fd;
      font-weight: 300;
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ========================= */
    /* DATA DISPLAY GRID */
    /* ========================= */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 35px;
    }

    .full-width {
      grid-column: span 2;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 25px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
    }

    .info-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(56, 189, 248, 0.4);
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .icon-box {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
    }

    .text-box {
      display: flex;
      flex-direction: column;
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      color: #93c5fd;
      letter-spacing: 1px;
      margin-bottom: 2px;
      font-weight: 500;
    }

    .value {
      font-size: 16px;
      color: #ffffff;
      font-weight: 600;
      word-break: break-word;
    }

    /* ========================= */
    /* BUTTON ACTION */
    /* ========================= */
    .button-area {
      text-align: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 15px 35px;
      border-radius: 50px;
      background: linear-gradient(135deg, #ffffff, #e2e8f0);
      color: #1e3a8a;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .back-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(56, 189, 248, 0.4);
      background: #ffffff;
    }

    /* ========================= */
    /* STATE LOADING / ERROR */
    /* ========================= */
    .loading-state {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(25px);
      border-radius: 30px;
      padding: 50px;
      text-align: center;
      color: #dbeafe;
      font-size: 18px;
    }

    .loading-state i {
      font-size: 40px;
      color: #38bdf8;
      margin-bottom: 15px;
    }

    /* ========================= */
    /* ANIMATIONS & RESPONSIVE */
    /* ========================= */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.05); opacity: 0.2; }
      100% { transform: scale(1); opacity: 0.6; }
    }

    @media (max-width: 768px) {
      .info-grid {
        grid-template-columns: 1fr;
      }
      .full-width {
        grid-column: span 1;
      }
      body {
        padding: 20px 10px;
      }
      .profile-header h1 {
        font-size: 26px;
      }
    }

  </style>

</head>

<body>

  <div class="blur-circle blur-1"></div>
  <div class="blur-circle blur-2"></div>

  <div class="container">

    <div class="loading-state" id="loading">
      <i class="fas fa-spinner fa-spin"></i>
      <p>Sinkronisasi Data Sekolah...</p>
    </div>

    <div id="mainContent" style="display: none;">
      
      <div class="profile-header">
        <div class="logo-wrapper">
          <img src="assets/logo/logo.png" alt="Logo Sekolah" onerror="this.src='https://placehold.co/150x150/white/1e3a8a?text=APASE'">
        </div>
        <h1 id="header_nama_sekolah">Nama Sekolah</h1>
        <p>Identitas Resmi Satuan Pendidikan</p>
      </div>

      <div class="info-grid">
        
        <div class="info-card">
          <div class="icon-box"><i class="fas fa-school"></i></div>
          <div class="text-box">
            <span class="label">Nama Lembaga</span>
            <span class="value" id="nama_sekolah">-</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box"><i class="fas fa-fingerprint"></i></div>
          <div class="text-box">
            <span class="label">NPSN Nasional</span>
            <span class="value" id="npsn">-</span>
          </div>
        </div>

        <div class="info-card full-width">
          <div class="icon-box"><i class="fas fa-map-marked-alt"></i></div>
          <div class="text-box">
            <span class="label">Alamat Jalan</span>
            <span class="value" id="alamat">-</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box"><i class="fas fa-map-signs"></i></div>
          <div class="text-box">
            <span class="label">Desa / Kelurahan</span>
            <span class="value" id="desa_Sekolah">-</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box"><i class="fas fa-building"></i></div>
          <div class="text-box">
            <span class="label">Kecamatan</span>
            <span class="value" id="kecamatan">-</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box"><i class="fas fa-city"></i></div>
          <div class="text-box">
            <span class="label">Kabupaten / Kota</span>
            <span class="value" id="kabupaten">-</span>
          </div>
        </div>

        <div class="info-card">
          <div class="icon-box"><i class="fas fa-map"></i></div>
          <div class="text-box">
            <span class="label">Provinsi</span>
            <span class="value" id="provinsi">-</span>
          </div>
        </div>

        <div class="info-card full-width">
          <div class="icon-box"><i class="fas fa-envelope"></i></div>
          <div class="text-box">
            <span class="label">Surel Resmi (Email)</span>
            <span class="value" id="email">-</span>
          </div>
        </div>

      </div>

      <div class="button-area">
        <a href="https://sugeng1104.github.io/apase-web/dashboard.html" class="back-btn">
          <i class="fas fa-arrow-left"></i> Kembali ke Dashboard
        </a>
      </div>

    </div>

  </div>

  <script>

    const API_URL = "https://script.google.com/macros/s/AKfycbzgXXqicDrfjxS0-7lc-mVjw391oJcMHoFuAfD4O_sk1vfm0bF9Pv4R_fqj6jNDVKZv/exec";

    // Proteksi Login Session
    if(!localStorage.getItem("loginUser")){
      window.location.href = "login.html";
    }

    function loadDataSekolah(){
      const callbackName = "profilCallback_" + Math.floor(Math.random() * 100000);
      
      window[callbackName] = function(result) {
        document.getElementById(callbackName).remove();
        delete window[callbackName];

        if(result && result.status === "success"){
          document.getElementById("loading").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
          
          const data = result.data;

          // Inject Data ke Element Dashboard Baru
          document.getElementById("header_nama_sekolah").innerText = data.nama_sekolah || "Nama Sekolah";
          document.getElementById("nama_sekolah").innerText       = data.nama_sekolah || "-";
          document.getElementById("npsn").innerText               = data.npsn || "-";
          document.getElementById("alamat").innerText             = data.alamat || "-";
          document.getElementById("desa_Sekolah").innerText       = data.Desa_Sekolah || "-"; 
          document.getElementById("kecamatan").innerText          = data.Kecamatan || "-";
          document.getElementById("kabupaten").innerText          = data.Kabupaten || "-";
          document.getElementById("provinsi").innerText           = data.Provinsi || "-";
          document.getElementById("email").innerText              = data.email || "-";
        } else {
          document.getElementById("loading").innerHTML = `<i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i><p>${result.message || 'Gagal memuat profil sekolah.'}</p>`;
        }
      };

      const script = document.createElement("script");
      script.id = callbackName;
      script.src = `${API_URL}?action=getProfilSekolah&prefix=${callbackName}&t=${new Date().getTime()}`;
      
      script.onerror = function() {
        document.getElementById("loading").innerHTML = '<i class="fas fa-wifi" style="color: #ef4444;"></i><p>Gangguan Jaringan. Gagal terhubung ke Apps Script Server.</p>';
      };

      document.body.appendChild(script);
    }

    // Jalankan eksekusi data
    loadDataSekolah();

  </script>

</body>
</html>
