<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Data Peserta Didik</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a,
#2563eb
);

min-height:100vh;

padding:30px;

color:white;

overflow-x:hidden;

}

.container{

max-width:1700px;

margin:auto;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.header h1{

font-size:38px;

font-weight:700;

}

/* BUTTON */

.back-btn{

padding:14px 28px;

border:none;

border-radius:14px;

background:#facc15;

color:#1e293b;

font-size:15px;

font-weight:700;

cursor:pointer;

transition:.3s;

box-shadow:
0 4px 15px rgba(0,0,0,0.2);

}

.back-btn:hover{

background:#fde047;

transform:translateY(-2px);

}

/* STATISTIK */

.statistik-row{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

margin-bottom:35px;

}

.stat-box{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:22px;

padding:25px;

cursor:pointer;

transition:.3s;

box-shadow:
0 8px 25px rgba(0,0,0,0.2);

text-align:center;

}

.stat-box:hover{

transform:translateY(-5px);

background:
rgba(255,255,255,0.18);

}

.stat-box h2{

font-size:40px;

margin-bottom:10px;

font-weight:700;

color:#facc15;

}

.stat-box p{

font-size:16px;

font-weight:600;

}

/* TABLE */

.table-container{

background:
rgba(255,255,255,0.12);

backdrop-filter:blur(20px);

border:
1px solid rgba(255,255,255,0.18);

border-radius:25px;

padding:25px;

overflow-x:auto;

box-shadow:
0 8px 30px rgba(0,0,0,0.2);

}

.table-title{

font-size:26px;

font-weight:700;

margin-bottom:20px;

}

/* FILTER */

.filter-container{

display:flex;

justify-content:space-between;

align-items:center;

gap:15px;

margin-bottom:20px;

flex-wrap:wrap;

}

.search-box{

flex:1;

min-width:250px;

}

.search-box input{

width:100%;

padding:14px 18px;

border:none;

border-radius:14px;

outline:none;

font-size:15px;

background:white;

color:#1e293b;

font-weight:500;

}

.filter-kelas{

min-width:220px;

}

.filter-kelas select{

width:100%;

padding:14px 18px;

border:none;

border-radius:14px;

outline:none;

font-size:15px;

background:#facc15;

color:#1e293b;

font-weight:700;

cursor:pointer;

}

/* TABLE */

table{

width:100%;

border-collapse:collapse;

min-width:1200px;

background:white;

border-radius:16px;

overflow:hidden;

}

th{

background:#facc15;

color:#1e293b;

padding:16px;

font-size:14px;

font-weight:700;

text-align:left;

border:2px solid black;

}

td{

padding:14px;

font-size:14px;

color:#1e293b;

border:2px solid black;

}

tr:hover{

background:#f8fafc;

}

/* MODAL */

.modal{

display:none;

position:fixed;

z-index:999;

left:0;
top:0;

width:100%;
height:100%;

background:
rgba(0,0,0,0.7);

padding:30px;

overflow:auto;

}

.modal-content{

background:white;

max-width:850px;

margin:auto;

padding:30px;

border-radius:25px;

position:relative;

}

.close{

position:absolute;

right:25px;

top:15px;

font-size:32px;

cursor:pointer;

color:#1e293b;

font-weight:700;

}

.modal-title{

font-size:24px;

font-weight:700;

margin-bottom:25px;

color:#1e293b;

text-align:center;

}

/* LOADING */

.loading{

text-align:center;

font-size:18px;

padding:40px;

font-weight:600;

}

/* RESPONSIVE */

@media(max-width:768px){

.header{

flex-direction:column;

align-items:flex-start;

}

.filter-container{

flex-direction:column;

align-items:stretch;

}

}

</style>

</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<h1>
DATA PESERTA DIDIK
</h1>

<button class="back-btn"
onclick="window.location.href='https://sdnpanditan1.github.io/apase-web/dashboard.html'">

Kembali

</button>

</div>

<!-- STATISTIK -->

<div class="statistik-row">

<div class="stat-box"
     onclick="openChart('kelas')">

<h2 id="totalKelas">0</h2>

<p>
Statistik per Kelas
</p>

</div>

<div class="stat-box"
     onclick="openChart('gender')">

<h2 id="totalGender">0</h2>

<p>
Laki-laki vs Perempuan
</p>

</div>

<div class="stat-box"
     onclick="openChart('kecamatan')">

<h2 id="totalKecamatan">0</h2>

<p>
Statistik Kecamatan
</p>

</div>

<div class="stat-box"
     onclick="openChart('bantuan')">

<h2 id="totalBantuan">0</h2>

<p>
Penerima Bantuan
</p>

</div>

<div class="stat-box">

<h2 id="totalSiswa">
0
</h2>

<p>
Total Keseluruhan Siswa
</p>

</div>

</div>

<!-- TABLE -->

<div class="table-container">

<div class="table-title">

Daftar Peserta Didik

</div>

<!-- FILTER -->

<div class="filter-container">

<div class="search-box">

<input type="text"
       id="searchInput"
       placeholder="Cari Nama / NIS / Kelas..."
       onkeyup="filterTable()">

</div>

<div class="filter-kelas">

<select id="kelasFilter"
        onchange="filterTable()">

<option value="">
Semua Kelas
</option>

</select>

</div>

</div>

<table>

<thead>

<tr>

<th>No</th>
<th>NIS</th>
<th>NISN</th>
<th>Nama Murid</th>
<th>L/P</th>
<th>Kelas</th>
<th>Tempat Lahir</th>
<th>Tanggal Lahir</th>
<th>Ayah</th>
<th>Ibu</th>
<th>Asal Sekolah (TK)</th>

</tr>

</thead>

<tbody id="dataPesertaDidik">

<tr>

<td colspan="11"
class="loading">

Memuat data peserta didik...

</td>

</tr>

</tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal"
     id="chartModal">

<div class="modal-content">

<span class="close"
      onclick="closeModal()">

&times;

</span>

<div class="modal-title"
     id="modalTitle">

Grafik Statistik

</div>

<canvas id="popupChart"></canvas>

</div>

</div>

<script>

// API URL
const API_URL =
"https://script.google.com/macros/s/AKfycbzSOyQZ19w7IjuFIFmBqsFMvxC4bOifMXSxBR0UpwZ_Pdcsf8K39q_1Fv6z5VSUbD66GQ/exec";

// GLOBAL
let globalData = [];
let popupChart = null;

// LOAD DATA
async function loadDataPesertaDidik(){

try{

const response =
await fetch(
`${API_URL}?action=getPesertaDidik`
);

const result =
await response.json();

globalData =
result.data;

renderTable(globalData);

isiFilterKelas();

document.getElementById(
"totalSiswa"
).innerHTML =
globalData.length;

hitungStatistik();

}

catch(error){

document.getElementById(
"dataPesertaDidik"
).innerHTML = `

<tr>

<td colspan="11"
class="loading">

Gagal memuat data

</td>

</tr>

`;

console.log(error);

}

}

// RENDER TABLE
function renderTable(data){

let html = "";

data.forEach(item=>{

html += `

<tr>

<td>${item.no}</td>
<td>${item.nis}</td>
<td>${item.nisn}</td>
<td>${item.nama}</td>
<td>${item.lp}</td>
<td>${item.kelas}</td>
<td>${item.tempat_lahir}</td>
<td>${item.tanggal_lahir}</td>
<td>${item.ayah}</td>
<td>${item.ibu}</td>
<td>${item.asal_tk}</td>

</tr>

`;

});

document.getElementById(
"dataPesertaDidik"
).innerHTML = html;

}

// FILTER KELAS
function isiFilterKelas(){

let kelasUnik = [];

globalData.forEach(item=>{

if(
!kelasUnik.includes(item.kelas)
){
kelasUnik.push(item.kelas);
}

});

kelasUnik.sort();

let html =
'<option value="">Semua Kelas</option>';

kelasUnik.forEach(kelas=>{

html += `
<option value="${kelas}">
${kelas}
</option>
`;

});

document.getElementById(
"kelasFilter"
).innerHTML = html;

}

// FILTER TABLE
function filterTable(){

const keyword =
document.getElementById(
"searchInput"
).value.toLowerCase();

const kelas =
document.getElementById(
"kelasFilter"
).value;

const filtered =
globalData.filter(item=>{

const cocokText =
Object.values(item)
.join(" ")
.toLowerCase()
.includes(keyword);

const cocokKelas =
kelas === "" ||
item.kelas == kelas;

return cocokText && cocokKelas;

});

renderTable(filtered);

}

// HITUNG STATISTIK
function hitungStatistik(){

let kelas = {};

globalData.forEach(item=>{

kelas[item.kelas] =
(kelas[item.kelas] || 0) + 1;

});

document.getElementById(
"totalKelas"
).innerHTML =
Object.keys(kelas).length;

let laki = 0;
let perempuan = 0;

globalData.forEach(item=>{

if(
String(item.lp).toUpperCase() === "L"
){
laki++;
}else{
perempuan++;
}

});

document.getElementById(
"totalGender"
).innerHTML =
`${laki}/${perempuan}`;

let kecamatan = {};

globalData.forEach(item=>{

kecamatan[item.kecamatan] =
(kecamatan[item.kecamatan] || 0) + 1;

});

document.getElementById(
"totalKecamatan"
).innerHTML =
Object.keys(kecamatan).length;

let bantuan = 0;

globalData.forEach(item=>{

if(item.kip || item.kks || item.pkh){
bantuan++;
}

});

document.getElementById(
"totalBantuan"
).innerHTML =
bantuan;

}

// OPEN CHART
function openChart(type){

document.getElementById(
"chartModal"
).style.display = "block";

const ctx =
document.getElementById(
"popupChart"
);

if(popupChart){
popupChart.destroy();
}

if(type === "kelas"){

document.getElementById(
"modalTitle"
).innerHTML =
"Statistik Jumlah Siswa per Kelas";

let map = {};

globalData.forEach(item=>{

map[item.kelas] =
(map[item.kelas] || 0) + 1;

});

popupChart = new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(map),
datasets:[{
label:"Jumlah Siswa",
data:Object.values(map)
}]
}
});

}

if(type === "gender"){

document.getElementById(
"modalTitle"
).innerHTML =
"Statistik Laki-laki vs Perempuan";

let laki = 0;
let perempuan = 0;

globalData.forEach(item=>{

if(
String(item.lp).toUpperCase() === "L"
){
laki++;
}else{
perempuan++;
}

});

popupChart = new Chart(ctx,{
type:"pie",
data:{
labels:["Laki-laki","Perempuan"],
datasets:[{
data:[laki,perempuan]
}]
}
});

}

if(type === "kecamatan"){

document.getElementById(
"modalTitle"
).innerHTML =
"Statistik per Kecamatan";

let map = {};

globalData.forEach(item=>{

map[item.kecamatan] =
(map[item.kecamatan] || 0) + 1;

});

popupChart = new Chart(ctx,{
type:"bar",
data:{
labels:Object.keys(map),
datasets:[{
label:"Jumlah",
data:Object.values(map)
}]
}
});

}

if(type === "bantuan"){

document.getElementById(
"modalTitle"
).innerHTML =
"Statistik Penerima KIP / KKS / PKH";

let kip = 0;
let kks = 0;
let pkh = 0;

globalData.forEach(item=>{

if(item.kip) kip++;
if(item.kks) kks++;
if(item.pkh) pkh++;

});

popupChart = new Chart(ctx,{
type:"doughnut",
data:{
labels:["KIP","KKS","PKH"],
datasets:[{
data:[kip,kks,pkh]
}]
}
});

}

}

// CLOSE MODAL
function closeModal(){

document.getElementById(
"chartModal"
).style.display = "none";

}

// INIT
loadDataPesertaDidik();

</script>

</body>
</html>
